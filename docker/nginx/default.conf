server {
    # Escuta requisições na porta 80 (HTTP padrão dentro do container)
    listen 80;

    # Define o diretório raiz da aplicação Laravel
    # (a pasta public/ é o único ponto de entrada público do Laravel)
    root /var/www/public;

    # Define os arquivos de índice que o Nginx tentará servir por padrão
    index index.php index.html index.htm;

    # Nome do servidor (aceita qualquer hostname)
    server_name _;

    # Bloco de roteamento principal:
    # Tenta servir o arquivo estático solicitado; se não existir,
    # redireciona para o index.php (front controller do Laravel)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Bloco de processamento PHP:
    # Todas as requisições .php são encaminhadas via FastCGI
    # para o container 'app' na porta 9000 (PHP-FPM)
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # 'app' é o nome do serviço no docker-compose.yml
        # O Docker resolve automaticamente esse nome via DNS interno
        fastcgi_pass app:9000;

        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Ignora logs para arquivos ocultos e bloqueia acesso a eles
    location ~ /\.ht {
        deny all;
    }
}
